name: Generate Markdown Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "settings.json.d.ts"
      - "prepend.md"
      - ".github/workflows/jsdoc.yml"
      - "typedoc.json"

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm i

      - run: npx typedoc

      - uses: EndBug/add-and-commit@v10.0.0
        with:
          add: README.md
