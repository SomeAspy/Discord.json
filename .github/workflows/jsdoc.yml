name: Generate Markdown Docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "settings.json.d.ts"
      - "prepend.md"
      - ".github/workflows/jsdoc.yml"

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: npm i typedoc typedoc-plugin-markdown

      - run: npx run typedoc --plugin typedoc-plugin-markdown --readme prepend.md --out ./ --cleanOutputDir false settings.json.d.ts --flattenOutputFiles --mergeReadme --hideBreadcrumbs --hidePageTitle --hidePageHeader --outputFileStrategy modules

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: auto-update readme"
          file_pattern: "README.md"
